<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Virtual Soundforge</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="app-shell">
    <nav class="top-nav card">
      <a class="nav-link current" href="./index.html">Composer</a>
      <a class="nav-link" href="./details.html">Details</a>
    </nav>

    <section class="hero">
      <p class="eyebrow">Virtual Soundforge</p>
      <h1>Generative harmony in the browser</h1>
      <p class="lede">
        Shape key, texture, note length, and voice count, then render a seeded
        harmonic sketch with the built-in synth engine.
      </p>
    </section>

    <section class="controls card">
      <div class="grid">
        <label>
          <span>Mode</span>
          <select id="mode">
            <option value="random">Random</option>
            <option value="phrase">Phrase</option>
            <option value="song" selected>Song</option>
          </select>
        </label>
        <label>
          <span>Key</span>
          <select id="key">
            <option>C</option>
            <option>C#</option>
            <option>D</option>
            <option>D#</option>
            <option>E</option>
            <option>F</option>
            <option>F#</option>
            <option>G</option>
            <option>G#</option>
            <option>A</option>
            <option>A#</option>
            <option>B</option>
          </select>
        </label>
        <label>
          <span>Scale</span>
          <select id="scale">
            <option value="major">Major</option>
            <option value="minor">Minor</option>
          </select>
        </label>
        <label>
          <span>Tempo</span>
          <input id="tempo" type="number" min="60" max="180" step="1" value="112" />
        </label>
        <label>
          <span>Bars</span>
          <input id="bars" type="number" min="4" max="16" step="1" value="8" />
        </label>
        <label>
          <span>Form</span>
          <select id="formStyle">
            <option value="balanced">Balanced</option>
            <option value="short">Short</option>
            <option value="full">Full</option>
          </select>
        </label>
        <label>
          <span>Voices</span>
          <input id="voices" type="number" min="1" max="6" step="1" value="3" />
        </label>
        <label>
          <span>Note Length</span>
          <input id="noteLength" type="range" min="25" max="100" step="1" value="82" />
        </label>
        <label>
          <span>Seed</span>
          <input id="seed" type="text" value="aurora-01" />
        </label>
        <label>
          <span>Density</span>
          <input id="density" type="range" min="0" max="100" step="1" value="58" />
        </label>
        <label>
          <span>Complexity</span>
          <input id="complexity" type="range" min="0" max="100" step="1" value="44" />
        </label>
        <label>
          <span>Variation</span>
          <input id="variation" type="range" min="0" max="100" step="1" value="36" />
        </label>
        <label>
          <span>Drama</span>
          <input id="drama" type="range" min="0" max="100" step="1" value="52" />
        </label>
        <label>
          <span>Evolution</span>
          <input id="evolution" type="range" min="0" max="100" step="1" value="48" />
        </label>
      </div>

      <div class="actions">
        <button id="generateButton" type="button">Generate</button>
        <button id="shuffleSeedButton" type="button">Shuffle Seed</button>
        <button id="playButton" type="button">Play</button>
        <button id="exportButton" type="button">Export WAV</button>
        <button id="exportMidiButton" type="button">Export MIDI</button>
      </div>
    </section>

    <section class="card">
      <h2>Playback</h2>
      <audio id="audio" controls></audio>
      <p id="status" class="status">Ready.</p>
    </section>
  </main>

  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
